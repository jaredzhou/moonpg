# MoonPG CI — check / fmt / test on every push and PR.

name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres_pass
          POSTGRES_HOST_AUTH_METHOD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Update dependencies
        run: |
          moon version --all
          moon update

      - name: Setup test database and users
        run: |
          sudo apt-get update -y && sudo apt-get install -y postgresql-client
          PGPASSWORD=postgres_pass psql -h localhost -U postgres -c "CREATE DATABASE moonpg_test;"
          # Optional: user for PG_PLAIN_CONN auth test (CI does not set the env var, so the test is skipped)
          PGPASSWORD=postgres_pass psql -h localhost -U postgres -c "CREATE USER moonpg_plain WITH PASSWORD 'plain_pass';"
          PGPASSWORD=postgres_pass psql -h localhost -U postgres -d moonpg_test -c "GRANT ALL ON SCHEMA public TO moonpg_plain;"

      # Type-check with warnings as errors.
      - name: Check
        run: moon check --deny-warn

      # Format check.
      - name: Format check
        run: moon fmt --check

      # Build and run all tests.
      - name: Test
        env:
          PGCONN: "postgres://postgres:postgres_pass@localhost:5432/moonpg_test"
        run: moon test --target native --deny-warn
