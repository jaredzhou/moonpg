# pg_hba.conf — moonpg development
#
# Three test auth methods, each via a dedicated user:
#   moonpg_plain  → password  (cleartext)
#   moonpg_md5    → md5
#   moonpg_scram  → scram-sha-256
#
# Entries are tried top-to-bottom; first match wins.

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Unix-domain sockets — trust for the postgres superuser
local   all             postgres                                trust

# === moonpg test users (TCP, no SSL) ===
# 127.0.0.1/32: direct localhost (e.g. psql inside container)
# 172.16.0.0/12: Docker bridge NAT (e.g. host → localhost:5432 port forwarding)
host    moonpg_test     moonpg_plain    127.0.0.1/32            password
host    moonpg_test     moonpg_plain    172.16.0.0/12           password
host    moonpg_test     moonpg_plain    ::1/128                 password
host    moonpg_test     moonpg_md5      127.0.0.1/32            md5
host    moonpg_test     moonpg_md5      172.16.0.0/12           md5
host    moonpg_test     moonpg_md5      ::1/128                 md5
host    moonpg_test     moonpg_scram    127.0.0.1/32            scram-sha-256
host    moonpg_test     moonpg_scram    172.16.0.0/12           scram-sha-256
host    moonpg_test     moonpg_scram    ::1/128                 scram-sha-256

# Local IPv4/IPv6 — trust for convenience during development
host    all             all             127.0.0.1/32            trust
host    all             all             ::1/128                 trust

# Replication
local   replication     all                                     trust
host    replication     all             127.0.0.1/32            trust
host    replication     all             ::1/128                 trust

# External connections — scram-sha-256
host    all             all             all                     scram-sha-256
